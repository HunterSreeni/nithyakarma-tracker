name: ci

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    working-directory: app

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}

  edge-functions:
    # supabase/functions/** runs on Deno, not Node - excluded from the `verify`
    # job's `npm run test` (vitest/esbuild can't parse Deno.test or jsr:
    # imports). Was entirely untested in CI until this job; observanceMatch.ts
    # is the first Deno-side test this project has, added alongside Phase 3
    # of the panchangam-observances work (2026-07-23).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno test supabase/functions/_shared/observanceMatch.test.ts

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
      # Non-destructive specs only. The full journey (@destructive) deletes a
      # shared live account and must be re-seeded first, so it is a manual
      # pre-release gate, not a CI gate. E2E_* secrets are passed for when
      # destructive specs are run in a dedicated, seeded workflow later.
      - run: npx playwright test --grep-invert "@destructive"
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
